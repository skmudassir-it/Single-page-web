<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resizr - Fast Image Resizing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">Resizr</div>
            <p class="tagline">Lightning fast, client-side image resizing.</p>
        </header>

        <main>
            <div class="upload-area" id="dropZone">
                <div class="upload-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <h3>Drop your image here</h3>
                    <p>or</p>
                    <button class="btn-primary" id="uploadBtn">Browse Files</button>
                    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" hidden>
                </div>
            </div>

            <div class="editor-container hidden" id="editorContainer">
                <div class="preview-section">
                    <img id="previewImage" src="" alt="Image preview">
                    <div class="image-info">
                        <span id="originalDims">Original: 0 x 0</span>
                        <span id="fileSize">Size: 0 KB</span>
                    </div>
                </div>

                <div class="controls-section">
                    <div class="control-group">
                        <label>Dimensions</label>
                        <div class="dims-inputs">
                            <div class="input-wrapper">
                                <label for="widthInput">W</label>
                                <input type="number" id="widthInput" placeholder="Width">
                            </div>
                            <div class="link-icon" id="aspectRatioLock" title="Lock Aspect Ratio">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            </div>
                            <div class="input-wrapper">
                                <label for="heightInput">H</label>
                                <input type="number" id="heightInput" placeholder="Height">
                            </div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="qualitySlider">Quality (<span id="qualityValue">90%</span>)</label>
                        <input type="range" id="qualitySlider" min="1" max="100" value="90">
                    </div>

                    <div class="control-group">
                         <label>Format</label>
                         <div class="format-options">
                             <button class="format-btn active" data-format="image/jpeg">JPG</button>
                             <button class="format-btn" data-format="image/png">PNG</button>
                             <button class="format-btn" data-format="image/webp">WEBP</button>
                         </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-secondary" id="resetBtn">Reset</button>
                        <button class="btn-primary" id="downloadBtn">Download Resized</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Privacy First: Images never leave your browser.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
